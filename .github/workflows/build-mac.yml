name: Build macOS app

# Bouwt de Mac-app (Avalonia mAIkey.Desktop) op een gratis macOS-runner en zet
# een kant-en-klare .app klaar als download-artifact. Zo hoef je vanaf Windows
# alleen te pushen; op de Mac download je de .app. (Ad-hoc ondertekend, niet
# genotariseerd — de ontvangende Mac moet Gatekeeper één keer toestaan.)

on:
  push:
    branches: [ master, main ]
    paths:
      - 'mAIkey.Desktop/**'
      - 'mAIkey.Core/**'
      - '.github/workflows/build-mac.yml'
  workflow_dispatch:   # handmatig starten via de Actions-tab

jobs:
  build:
    runs-on: macos-14   # Apple Silicon-runner
    strategy:
      fail-fast: false
      matrix:
        rid: [osx-arm64, osx-x64]

    steps:
      - uses: actions/checkout@v4

      - name: .NET SDK installeren
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish (${{ matrix.rid }})
        run: >
          dotnet publish mAIkey.Desktop/mAIkey.Desktop.csproj
          -c Release -r ${{ matrix.rid }} --self-contained true
          -o publish -nologo

      - name: .app-bundel maken
        run: |
          set -e
          VERSION="1.0.${{ github.run_number }}"
          APP="mAIkey.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp -R publish/* "$APP/Contents/MacOS/"
          sed "s/__VERSION__/$VERSION/g" mAIkey.Desktop/Info.plist > "$APP/Contents/Info.plist"
          chmod +x "$APP/Contents/MacOS/mAIkey.Desktop"

      - name: Icoon toevoegen (.ico -> .icns)
        run: |
          set -e
          ICO="mAIkey.Desktop/Resources/maikey.ico"
          if [ -f "$ICO" ]; then
            # Grootste frame uit de .ico halen en naar .icns converteren
            sips -s format png "$ICO" --out icon.png >/dev/null 2>&1 || true
            if [ -f icon.png ]; then
              mkdir -p icon.iconset
              for s in 16 32 64 128 256 512; do
                sips -z $s $s icon.png --out "icon.iconset/icon_${s}x${s}.png" >/dev/null 2>&1 || true
                d=$((s*2)); sips -z $d $d icon.png --out "icon.iconset/icon_${s}x${s}@2x.png" >/dev/null 2>&1 || true
              done
              iconutil -c icns icon.iconset -o "mAIkey.app/Contents/Resources/maikey.icns" || true
            fi
          fi

      - name: Ad-hoc ondertekenen (gratis; laat de app draaien op Apple Silicon)
        run: codesign --force --deep --sign - "mAIkey.app"

      - name: Inpakken
        run: ditto -c -k --keepParent "mAIkey.app" "mAIkey-${{ matrix.rid }}.zip"

      - name: Uploaden als download
        uses: actions/upload-artifact@v4
        with:
          name: mAIkey-${{ matrix.rid }}
          path: mAIkey-${{ matrix.rid }}.zip
          retention-days: 30
