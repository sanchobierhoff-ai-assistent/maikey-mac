name: Build macOS app

# Bouwt de Mac-app (Avalonia mAIkey.Desktop) op een gratis macOS-runner en doet twee dingen:
#  1) zet een kant-en-klare .app klaar als download-artifact (voor een snelle losse test);
#  2) publiceert een Velopack-update-release naar de Releases van deze repo, zodat een
#     éénmaal geïnstalleerde app zichzelf bijwerkt (install once → update).
#
# LET OP: voor auto-update moet deze repo openbaar zijn (de app leest de releases zonder
# token). De broncode bevat geen geheimen. Zonder notarisatie (Apple Developer ID) vraagt
# de eerste installatie nog één keer om Gatekeeper toe te staan.

on:
  push:
    branches: [ master, main ]
    paths:
      - 'mAIkey.Desktop/**'
      - 'mAIkey.Core/**'
      - '.github/workflows/build-mac.yml'
  workflow_dispatch:

permissions:
  contents: write   # nodig om Releases te maken met de ingebouwde GITHUB_TOKEN

jobs:
  build:
    runs-on: macos-14
    strategy:
      fail-fast: false
      max-parallel: 1        # niet parallel: voorkomt race bij het aanmaken van releases
      matrix:
        rid: [osx-arm64, osx-x64]

    steps:
      - uses: actions/checkout@v4

      - name: .NET SDK installeren
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish (${{ matrix.rid }})
        run: >
          dotnet publish mAIkey.Desktop/mAIkey.Desktop.csproj
          -c Release -r ${{ matrix.rid }} --self-contained true
          -o publish -nologo

      # ── 1) Losse .app als download-artifact ──
      - name: .app-bundel maken
        run: |
          set -e
          VERSION="1.0.${{ github.run_number }}"
          APP="mAIkey.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp -R publish/* "$APP/Contents/MacOS/"
          sed "s/__VERSION__/$VERSION/g" mAIkey.Desktop/Info.plist > "$APP/Contents/Info.plist"
          chmod +x "$APP/Contents/MacOS/mAIkey.Desktop"

      - name: Ad-hoc ondertekenen
        run: codesign --force --deep --sign - "mAIkey.app"

      - name: Inpakken
        run: ditto -c -k --keepParent "mAIkey.app" "mAIkey-${{ matrix.rid }}.zip"

      - name: Uploaden als download
        uses: actions/upload-artifact@v4
        with:
          name: mAIkey-${{ matrix.rid }}
          path: mAIkey-${{ matrix.rid }}.zip
          retention-days: 30

      # ── 2) Velopack-update-release publiceren ──
      - name: vpk installeren
        run: dotnet tool install -g vpk --version 1.2.0

      - name: Vorige release ophalen (voor delta-updates)
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          mkdir -p Releases
          vpk download github --repoUrl "https://github.com/${{ github.repository }}" \
            --channel ${{ matrix.rid }} --outputDir Releases \
            --token ${{ secrets.GITHUB_TOKEN }} || echo "(geen vorige release — eerste voor dit kanaal)"

      - name: Velopack-pakket maken
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          vpk pack \
            --packId mAIkey \
            --packVersion 1.0.${{ github.run_number }} \
            --packDir publish \
            --mainExe mAIkey.Desktop \
            --packTitle mAIkey \
            --channel ${{ matrix.rid }} \
            --outputDir Releases

      - name: Update publiceren naar Releases
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          vpk upload github --repoUrl "https://github.com/${{ github.repository }}" \
            --channel ${{ matrix.rid }} --outputDir Releases \
            --token ${{ secrets.GITHUB_TOKEN }} \
            --publish true --merge true \
            --releaseName "mAIkey (${{ matrix.rid }}) 1.0.${{ github.run_number }}" \
            --tag ${{ matrix.rid }}-1.0.${{ github.run_number }}